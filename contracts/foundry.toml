[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "cancun"
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]

[rpc_endpoints]
gsx_testnet = "${GSX_RPC_URL}"
local = "http://localhost:8545"

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
