name: Contracts

on:
  push:
    paths:
      - "contracts/**"
      - "src/ltp/anchor/**"
      - "tests/test_contract_integration.py"
  pull_request:
    paths:
      - "contracts/**"
      - "src/ltp/anchor/**"
      - "tests/test_contract_integration.py"

jobs:
  forge-test:
    name: Forge Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install forge-std
        working-directory: contracts
        run: forge install foundry-rs/forge-std --no-commit

      - name: Run forge tests
        working-directory: contracts
        run: forge test -vvv

  integration-test:
    name: Python ↔ Contract Integration
    runs-on: ubuntu-latest
    needs: forge-test
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          pip install -e ".[dev,chain]"

      - name: Install forge-std and build contracts
        working-directory: contracts
        run: |
          forge install foundry-rs/forge-std --no-commit
          forge build

      - name: Start anvil
        run: |
          anvil &
          sleep 2

      - name: Deploy contract to local anvil
        working-directory: contracts
        run: |
          forge script script/Deploy.s.sol --rpc-url http://localhost:8545 --broadcast

      - name: Run integration tests
        run: pytest tests/test_contract_integration.py -v
